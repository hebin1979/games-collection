<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝石消除</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 15px;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 20px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #ffd700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 12px;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            aspect-ratio: 1;
        }

        .cell:hover {
            background: rgba(255,255,255,0.2);
        }

        .cell.selected {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .gem {
            font-size: 24px;
            transition: all 0.3s;
        }

        .cell.selected .gem {
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
        }

        .cell.eliminating .gem {
            animation: eliminate 0.4s forwards;
        }

        .cell.fall-in .gem {
            animation: fallIn 0.4s forwards;
        }

        @keyframes eliminate {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes fallIn {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .game-over.hidden {
            display: none;
        }

        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn-restart {
            padding: 14px 40px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 400px) {
            .gem {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
            <h1>💎 宝石消除</h1>
            <div></div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">30</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最高分</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board" id="board"></div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <button class="btn-restart" onclick="initGame()">再来一局</button>
    </div>

    <script>
        const gems = ['💎', '💍', '🔮', '🎀', '🌟', '🍀'];
        const rows = 8;
        const cols = 8;
        let board = [];
        let moves = 30;
        let score = 0;
        let highScore = localStorage.getItem('match3_highscore') || 0;
        let selectedCell = null;
        let isProcessing = false;

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            board = [];
            moves = 30;
            score = 0;
            selectedCell = null;
            isProcessing = false;
            
            document.getElementById('moves').textContent = moves;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.add('hidden');

            // 初始化棋盘，确保没有初始匹配
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    let gem;
                    do {
                        gem = gems[Math.floor(Math.random() * gems.length)];
                    } while (isMatch(r, c, gem));
                    board[r][c] = gem;
                }
            }

            renderBoard();
        }

        function isMatch(r, c, gem) {
            // 检查横向
            if (c >= 2 && board[r][c-1] === gem && board[r][c-2] === gem) return true;
            // 检查纵向
            if (r >= 2 && board[r-1][c] === gem && board[r-2][c] === gem) return true;
            return false;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    if (selectedCell && selectedCell.row === r && selectedCell.col === c) {
                        cell.classList.add('selected');
                    }
                    
                    const gem = document.createElement('span');
                    gem.className = 'gem';
                    gem.textContent = board[r][c];
                    cell.appendChild(gem);
                    
                    cell.addEventListener('click', () => handleClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleClick(r, c) {
            if (isProcessing || moves <= 0) return;
            
            if (!selectedCell) {
                selectedCell = { row: r, col: c };
                renderBoard();
            } else {
                const dr = Math.abs(selectedCell.row - r);
                const dc = Math.abs(selectedCell.col - c);
                
                if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                    // 相邻格子，尝试交换
                    swapAndCheck(selectedCell.row, selectedCell.col, r, c);
                } else {
                    // 不相邻，重新选择
                    selectedCell = { row: r, col: c };
                    renderBoard();
                }
            }
        }

        async function swapAndCheck(r1, c1, r2, c2) {
            isProcessing = true;
            selectedCell = null;
            
            // 交换
            [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
            renderBoard();
            
            // 检查是否有匹配
            const matches = findMatches();
            
            if (matches.length > 0) {
                moves--;
                document.getElementById('moves').textContent = moves;
                await processMatches();
            } else {
                // 无匹配，换回来
                await sleep(200);
                [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
                renderBoard();
            }
            
            isProcessing = false;
            checkGameOver();
        }

        function findMatches() {
            const matches = new Set();
            
            // 检查横向
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols - 2; c++) {
                    const gem = board[r][c];
                    if (gem && gem === board[r][c+1] && gem === board[r][c+2]) {
                        matches.add(`${r},${c}`);
                        matches.add(`${r},${c+1}`);
                        matches.add(`${r},${c+2}`);
                    }
                }
            }
            
            // 检查纵向
            for (let r = 0; r < rows - 2; r++) {
                for (let c = 0; c < cols; c++) {
                    const gem = board[r][c];
                    if (gem && gem === board[r+1][c] && gem === board[r+2][c]) {
                        matches.add(`${r},${c}`);
                        matches.add(`${r+1},${c}`);
                        matches.add(`${r+2},${c}`);
                    }
                }
            }
            
            return Array.from(matches).map(s => {
                const [r, c] = s.split(',').map(Number);
                return { row: r, col: c };
            });
        }

        async function processMatches() {
            let matches = findMatches();
            
            while (matches.length > 0) {
                // 消除动画
                for (let m of matches) {
                    const cell = document.querySelector(`.cell[data-row="${m.row}"][data-col="${m.col}"]`);
                    if (cell) cell.classList.add('eliminating');
                }
                
                await sleep(400);
                
                // 计分
                score += matches.length * 10;
                document.getElementById('score').textContent = score;
                
                // 移除匹配
                for (let m of matches) {
                    board[m.row][m.col] = null;
                }
                
                // 下落
                await dropGems();
                
                // 填充新宝石
                await fillBoard();
                
                renderBoard();
                matches = findMatches();
            }
        }

        async function dropGems() {
            for (let c = 0; c < cols; c++) {
                let emptyRow = rows - 1;
                for (let r = rows - 1; r >= 0; r--) {
                    if (board[r][c] !== null) {
                        if (r !== emptyRow) {
                            board[emptyRow][c] = board[r][c];
                            board[r][c] = null;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        async function fillBoard() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === null) {
                        board[r][c] = gems[Math.floor(Math.random() * gems.length)];
                    }
                }
            }
            await sleep(100);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function checkGameOver() {
            if (moves <= 0) {
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('match3_highscore', highScore);
                    document.getElementById('highScore').textContent = highScore;
                }
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').classList.remove('hidden');
            }
        }

        initGame();
    </script>
</body>
</html>
